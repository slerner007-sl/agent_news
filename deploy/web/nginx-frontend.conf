# Lightweight nginx config for the SPA container.
# The outer (host) nginx terminates TLS and basic auth; this layer just
# serves static files and falls back to index.html so client-side routes
# (/news, /insights, ...) work on direct page loads.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /assets/ {
        access_log off;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
